image: node:24

stages:
  - test
  - publish

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

.default_node_job:
  before_script:
    - npm ci --cache .npm --prefer-offline

quality:
  extends: .default_node_job
  stage: test
  script:
    - npm run lint
    - npm test
    - npm run build
    - npm pack --dry-run

publish:npm:
  extends: .default_node_job
  stage: publish
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
    - when: never
  script:
    - npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
    - npm publish --access public
